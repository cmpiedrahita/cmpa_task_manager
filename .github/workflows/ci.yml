name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  test-backend:
    name: Backend Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: cmpa_user
          POSTGRES_PASSWORD: cmpa_password
          POSTGRES_DB: cmpa_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Run migrations
        working-directory: apps/backend
        env:
          DATABASE_URL: postgresql://cmpa_user:cmpa_password@localhost:5432/cmpa_db
        run: npm run migrate

      - name: Run tests
        working-directory: apps/backend
        env:
          DATABASE_URL: postgresql://cmpa_user:cmpa_password@localhost:5432/cmpa_db
          JWT_SECRET: ci_jwt_secret_minimum_32_chars_long_here
          JWT_EXPIRES_IN: 15m
          JWT_REFRESH_SECRET: ci_refresh_secret_minimum_32_chars_long
          JWT_REFRESH_EXPIRES_IN: 7d
          CORS_ORIGIN: http://localhost:5173
          NODE_ENV: test
        run: npm test -- --coverage

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: apps/backend/coverage/lcov.info

  sonarcloud:
    name: SonarCloud Analysis
    runs-on: ubuntu-latest
    needs: [test-backend, lint-frontend]
    if: github.event_name == 'pull_request'

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download coverage report
        uses: actions/download-artifact@v4
        with:
          name: coverage
          path: apps/backend/coverage

      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@master
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  lint-frontend:
    name: Frontend Build Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Run frontend tests
        working-directory: apps/frontend
        env:
          VITE_API_URL: http://localhost:3000/api
        run: npm test

      - name: Build frontend
        working-directory: apps/frontend
        env:
          VITE_API_URL: http://localhost:3000/api
        run: npm run build
